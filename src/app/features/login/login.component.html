<div class="login-container">

    <h2>Login</h2>

    <div class="form-group">
        <label>Usuario</label>

        <input
            type="text"
            [(ngModel)]="username"
        />
    </div>

    <div class="form-group">
        <label>Contraseña</label>

        <input
            type="password"
            [(ngModel)]="password"
        />
    </div>

    <button (click)="login()">
        Login
    </button>

    @if (errorMessage) {
        <p class="errorClass">
            {{ errorMessage }}
        </p>
    }

</div>
